<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      width: 240px;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #f1f5f9;
    }
    .logo {
      background: #4A90FF;
      color: #fff;
      font-weight: 800;
      font-size: 10px;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #1e293b;
    }
    .menu {
      padding: 6px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      color: #1e293b;
      text-align: left;
      transition: background 0.12s;
    }
    .menu-item:hover {
      background: #f1f5f9;
    }
    .menu-item svg {
      flex-shrink: 0;
      color: #64748b;
    }
    .menu-item:first-child svg { color: #4A90FF; }
    .menu-item .label {
      display: flex;
      flex-direction: column;
    }
    .menu-item .sublabel {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 1px;
    }
    .divider {
      height: 1px;
      background: #f1f5f9;
      margin: 4px 6px;
    }
    .status-bar {
      padding: 8px 16px 10px;
      font-size: 11px;
      color: #94a3b8;
      border-top: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #cbd5e1;
    }
    .status-dot.active { background: #22c55e; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">QA</div>
    <h1>QA Capture</h1>
  </div>

  <div class="menu">
    <button class="menu-item" id="btn-capture">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
      </svg>
      <span class="label">
        <span>캡처 시작</span>
        <span class="sublabel">Alt+Shift+Q</span>
      </span>
    </button>

    <div class="divider"></div>

    <button class="menu-item" id="btn-settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <span class="label">설정</span>
    </button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">확인 중...</span>
  </div>

  <script>
    // 캡처 시작
    document.getElementById('btn-capture').addEventListener('click', async () => {
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      if (!tab || tab.url.startsWith('chrome://') || tab.url.startsWith('chrome-extension://')) {
        return;
      }
      // 팝업 닫히고 캡처 시작
      chrome.runtime.sendMessage({ action: 'start-capture', tabId: tab.id });
      window.close();
    });

    // 설정
    document.getElementById('btn-settings').addEventListener('click', () => {
      chrome.runtime.openOptionsPage();
      window.close();
    });

    // 상태 확인
    (async () => {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const settings = await chrome.storage.sync.get(['spreadsheetId', 'driveFolderId']);
      if (settings.spreadsheetId && settings.driveFolderId) {
        dot.classList.add('active');
        text.textContent = '연결됨';
      } else {
        text.textContent = '설정 필요';
      }
    })();
  </script>
</body>
</html>
